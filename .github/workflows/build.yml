name: Build

# Builds the WPF app on Windows for every push/PR to master so changes are
# validated even when authored from non-Windows environments.
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Aljaras.sln

      - name: Build (Release)
        run: dotnet build Aljaras.sln -c Release --no-restore
